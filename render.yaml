services:
  - type: web
    name: factupro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Lo escribes manualmente en el dashboard de Render
      - key: SECRET_KEY
        generateValue: true  # Render genera un valor aleatorio automáticamente
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /api/health
